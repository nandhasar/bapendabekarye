<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Kegiatan - BEKARYE</title>
  <style>
    :root{--bg:#f1f5f9;--bg2:#ffffff;--bg3:#f8fafc;--text:#0f172a;--text2:#334155;--text3:#64748b;--border:#e2e8f0;--blue:#2563eb;--green:#059669;--red:#dc2626;--yellow:#f59e0b}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
    
    /* NAVBAR */
    .navbar{background:var(--bg2);padding:16px 20px;border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .navbar-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:20px}
    .navbar-brand{font-size:18px;font-weight:800}
    .navbar-right{display:flex;gap:10px;align-items:center}
    .nav-info{font-size:13px;color:var(--text2);font-weight:600}
    .btn-logout{padding:8px 14px;background:var(--red);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;transition:all .2s}
    .btn-logout:hover{background:#b91c1c;transform:translateY(-1px)}
    
    /* MAIN */
    .main{max-width:1400px;margin:0 auto;padding:20px}
    
    /* HEADER */
    .header{background:var(--bg2);padding:24px;border-radius:12px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .header h1{font-size:24px;margin-bottom:4px}
    .header p{color:var(--text3);font-size:14px}
    
    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:var(--bg2);padding:20px;border-radius:12px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .stat-card.pending{border-left-color:var(--yellow)}
    .stat-card.approved{border-left-color:var(--green)}
    .stat-card.rejected{border-left-color:var(--red)}
    .stat-label{font-size:12px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px}
    .stat-value{font-size:28px;font-weight:800}
    
    /* FILTER & BULK ACTIONS */
    .filter-bar{background:var(--bg2);padding:16px;border-radius:12px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .filter-bar select{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg2);color:var(--text)}
    .filter-bar select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    
    .bulk-actions{display:flex;gap:10px;align-items:center;margin-left:auto;padding:10px 16px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
    .bulk-info{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
    .btn-action-group{display:flex;gap:8px}
    
    .btn-refresh{padding:10px 16px;background:var(--blue);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s}
    .btn-refresh:hover{background:#1d4ed8;transform:translateY(-1px)}
    .btn-approve-all{padding:10px 14px;background:var(--green);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s;font-size:12px}
    .btn-approve-all:hover{background:#047857;transform:translateY(-1px)}
    .btn-reject-all{padding:10px 14px;background:var(--red);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s;font-size:12px}
    .btn-reject-all:hover{background:#b91c1c;transform:translateY(-1px)}
    .btn-clear{padding:10px 14px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s;font-size:12px}
    .btn-clear:hover{background:var(--border)}
    
    /* TABLE */
    .table-wrap{background:var(--bg2);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:800px}
    th{padding:14px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text2);background:#f8fafc;border-bottom:2px solid var(--border)}
    td{padding:14px;border-bottom:1px solid var(--border);font-size:13px}
    tr:hover{background:#f8fafc}
    
    /* CHECKBOX */
    input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:var(--blue)}
    th input[type="checkbox"]{margin:0}
    
    .badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
    .badge-pending{background:rgba(245,158,11,.15);color:var(--yellow)}
    .badge-approved{background:rgba(5,150,105,.15);color:var(--green)}
    .badge-rejected{background:rgba(220,38,38,.15);color:var(--red)}
    
    .btn-link{color:var(--blue);cursor:pointer;text-decoration:none;font-weight:600;font-size:12px}
    .btn-link:hover{text-decoration:underline}
    
    .actions{display:flex;gap:6px}
    .btn-action{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;transition:all .2s}
    .btn-approve{background:var(--green);color:white}
    .btn-approve:hover{background:#047857}
    .btn-reject{background:var(--red);color:white}
    .btn-reject:hover{background:#b91c1c}
    
    .empty{text-align:center;padding:40px 20px;color:var(--text3)}
    .loading{text-align:center;padding:40px 20px}
    .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.active{display:flex}
    .modal{background:var(--bg2);padding:24px;border-radius:12px;max-width:500px;width:90%}
    .modal h3{margin-bottom:16px;font-size:16px}
    .modal-info{background:var(--bg);padding:14px;border-radius:8px;margin-bottom:16px;font-size:13px;line-height:1.6}
    .modal-info strong{display:block;margin-bottom:4px;color:var(--blue)}
    .modal textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;min-height:80px;resize:vertical}
    .modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
    .modal-actions .btn-action{flex:1}
    
    .alert{padding:16px;border-radius:8px;margin-bottom:16px;display:none}
    .alert.show{display:block}
    .alert-error{background:rgba(220,38,38,.1);color:var(--red);border-left:4px solid var(--red)}
    .alert-success{background:rgba(5,150,105,.1);color:var(--green);border-left:4px solid var(--green)}
    
    @media(max-width:768px){
      .navbar-inner{flex-direction:column;gap:10px}
      .filter-bar{flex-direction:column}
      .filter-bar select{width:100%}
      .bulk-actions{width:100%;margin-left:0}
      .btn-action-group{flex-wrap:wrap}
      .actions{flex-wrap:wrap}
      th,td{padding:10px 6px;font-size:11px}
      .bulk-info{display:none}
    }
  </style>
</head>
<body>
  <!-- ALERT -->
  <div class="alert alert-error" id="alertError"></div>
  <div class="alert alert-success" id="alertSuccess"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">✅ Verifikasi Kegiatan</div>
      <div class="navbar-right">
        <div class="nav-info">
          <span id="infoAtasan">Loading...</span>
        </div>
        <a href="dashboard.html" style="padding:8px 14px;background:#e2e8f0;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;color:var(--text2)">📊 Dashboard</a>
        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <!-- HEADER -->
    <div class="header">
      <h1>✅ Panel Verifikasi Kegiatan</h1>
      <p id="headerSub">Verifikasi kegiatan bawahan Anda</p>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card pending">
        <div class="stat-label">⏳ Menunggu</div>
        <div class="stat-value" id="statPending">-</div>
      </div>
      <div class="stat-card approved">
        <div class="stat-label">✅ Disetujui</div>
        <div class="stat-value" id="statApproved">-</div>
      </div>
      <div class="stat-card rejected">
        <div class="stat-label">❌ Ditolak</div>
        <div class="stat-value" id="statRejected">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">👥 Total Bawahan</div>
        <div class="stat-value" id="statBawahan">-</div>
      </div>
    </div>

    <!-- FILTER -->
    <div class="filter-bar">
      <select id="filterStatus">
        <option value="">⏳ Semua Status</option>
        <option value="pending">Menunggu Verifikasi</option>
        <option value="approved">Disetujui</option>
        <option value="rejected">Ditolak</option>
      </select>
      <select id="filterPegawai">
        <option value="">Semua Pegawai</option>
      </select>
      <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>

      <!-- ⭐ BULK ACTIONS -->
      <div class="bulk-actions" id="bulkActionsBar" style="display: none;">
        <span class="bulk-info">
          <strong id="selectedCount">0</strong> dipilih
        </span>
        <div class="btn-action-group">
          <button class="btn-approve-all" onclick="bulkApprove()" title="Validasi semua yang dipilih">
            ✅ Validasi Semua
          </button>
          <button class="btn-reject-all" onclick="openBulkRejectModal()" title="Tolak semua yang dipilih">
            ❌ Tolak Semua
          </button>
          <button class="btn-clear" onclick="clearAllCheckbox()" title="Batal pilihan">
            Batal
          </button>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <!-- ⭐ CHECKBOX COLUMN -->
            <th style="width: 40px;">
              <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()" title="Pilih semua">
            </th>
            <th>Pegawai</th>
            <th>Tanggal</th>
            <th>Kegiatan</th>
            <th>Poin</th>
            <th>Bukti</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="8" class="loading">
              <div class="spinner"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- MODAL VERIFIKASI SINGLE -->
  <div class="modal-overlay" id="modalVerif">
    <div class="modal">
      <h3 id="modalTitle">Verifikasi Kegiatan</h3>
      <div class="modal-info" id="modalInfo"></div>
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:8px;">Catatan (jika ditolak):</label>
      <textarea id="catatanVerif" placeholder="Tulis alasan penolakan..."></textarea>
      <div class="modal-actions">
        <button class="btn-action" onclick="closeModal()" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)">Batal</button>
        <button class="btn-action btn-reject" onclick="verifikasi('tolak')">❌ Tolak</button>
        <button class="btn-action btn-approve" onclick="verifikasi('setuju')">✅ Setuju</button>
      </div>
    </div>
  </div>

  <!-- MODAL BULK REJECT -->
  <div class="modal-overlay" id="modalBulkReject">
    <div class="modal">
      <h3>❌ Tolak Semua yang Dipilih</h3>
      <div class="modal-info" style="background:rgba(220,38,38,.1);color:var(--red)">
        <strong id="bulkRejectCount">0</strong> kegiatan akan ditolak
      </div>
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:8px;">Alasan penolakan (berlaku untuk semua):</label>
      <textarea id="catatanBulkReject" placeholder="Tulis alasan penolakan..."></textarea>
      <div class="modal-actions">
        <button class="btn-action" onclick="closeBulkRejectModal()" style="background:var(--bg3);color:var(--text2);border:1px solid var(--border)">Batal</button>
        <button class="btn-action btn-reject" onclick="bulkReject()">❌ Tolak Semua</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    var API_URL = 'https://script.google.com/macros/s/AKfycbwExhaqgJiK9gK58gVZ5b-qbPEFWAPfHX_JuWV4DeHMZczBu59nm2E0__MSeTv6cJNquQ/exec';
    var SESSION_KEY = 'bekarye-session';
    
    var session = null;
    var allKegiatan = [];
    var filteredKegiatan = [];
    var selectedItems = new Set();
    var currentItem = null;
    var bawahan = [];

    // ============================================================
    // INIT
    // ============================================================
    function initApp() {
      try {
        console.log('🚀 Verifikasi page loading...');
        
        session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
        
        if (!session || !session.token || !session.nip) {
          alert('⚠️ Sesi tidak valid. Silakan login kembali.');
          location.href = 'index.html';
          return;
        }
        
        var canVerify = session.is_verifikator || 
                       session.eselon === 'II' || 
                       session.eselon === 'III' || 
                       session.eselon === 'IV';
        
        if (!canVerify) {
          showAlert('❌ Akses ditolak. Hanya pejabat eselon II/III/IV yang bisa verifikasi.', 'error');
          setTimeout(() => location.href = 'dashboard.html', 2000);
          return;
        }
        
        setupUI();
        loadData();
      } catch (err) {
        console.error('❌ Init error:', err);
        showAlert('❌ Error: ' + err.message, 'error');
      }
    }

    function setupUI() {
      var eselon = session.eselon || 'Staff';
      document.getElementById('infoAtasan').textContent = 
        session.nama + ' — ' + session.jabatan + ' — Eselon ' + eselon;
      document.getElementById('headerSub').textContent = 
        'Verifikasi kegiatan bawahan Eselon ' + eselon + ' dan di bawahnya';
    }

    // ============================================================
    // ALERT
    // ============================================================
    function showAlert(msg, type) {
      var elem = type === 'error' ? document.getElementById('alertError') : document.getElementById('alertSuccess');
      if (!elem) return;
      elem.textContent = msg;
      elem.classList.add('show');
      setTimeout(() => elem.classList.remove('show'), 5000);
    }

    // ============================================================
    // LOAD DATA
    // ============================================================
    function loadData() {
      console.log('🔄 Loading kegiatan...');
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="loading"><div class="spinner"></div></td></tr>';
      
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'getKegiatanVerifikasi', 
          nip: session.nip,
          eselon: session.eselon
        })
      })
      .then(r => r.json())
      .then(j => {
        if (j.ok) {
          allKegiatan = j.data && j.data.kegiatan ? j.data.kegiatan : [];
          bawahan = j.data && j.data.bawahan ? j.data.bawahan : [];
          
          var selectP = document.getElementById('filterPegawai');
          selectP.innerHTML = '<option value="">Semua Pegawai</option>';
          bawahan.forEach(b => {
            selectP.innerHTML += '<option value="' + (b.nip || '') + '">' + (b.nama || 'Unknown') + '</option>';
          });
          
          document.getElementById('statBawahan').textContent = bawahan.length;
          selectedItems.clear();
          updateStats();
          renderTable();
        } else {
          showAlert('❌ Error: ' + j.message, 'error');
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="empty">❌ Error: ' + j.message + '</td></tr>';
        }
      })
      .catch(err => {
        console.error('❌ Fetch error:', err);
        showAlert('❌ Fetch error: ' + err.message, 'error');
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="empty">❌ Error load data</td></tr>';
      });
    }

    // ============================================================
    // UPDATE STATS
    // ============================================================
    function updateStats() {
      var pending = allKegiatan.filter(k => k.can_verify).length;
      var approved = allKegiatan.filter(k => k.status_verif && k.status_verif.includes('Disetujui')).length;
      var rejected = allKegiatan.filter(k => k.status_verif === 'Ditolak').length;
      
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statApproved').textContent = approved;
      document.getElementById('statRejected').textContent = rejected;
    }

    // ============================================================
    // RENDER TABLE
    // ============================================================
    function renderTable() {
      var statusFilter = document.getElementById('filterStatus').value;
      var pegawaiFilter = document.getElementById('filterPegawai').value;
      
      filteredKegiatan = allKegiatan.filter(k => {
        if (pegawaiFilter && k.nip !== pegawaiFilter) return false;
        if (statusFilter === 'pending' && !k.can_verify) return false;
        if (statusFilter === 'approved' && (!k.status_verif || k.status_verif === 'Ditolak')) return false;
        if (statusFilter === 'rejected' && k.status_verif !== 'Ditolak') return false;
        return true;
      });
      
      var tbody = document.getElementById('tableBody');
      if (filteredKegiatan.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">📭 Tidak ada data</td></tr>';
        return;
      }
      
      var html = '';
      filteredKegiatan.forEach((k, idx) => {
        var tglDisplay = k.tanggal ? new Date(k.tanggal).toLocaleDateString('id-ID') : '-';
        var linkBukti = k.link_bukti ? '<a href="' + k.link_bukti + '" target="_blank" class="btn-link">📎 Lihat</a>' : '-';
        
        var statusBadge = '';
        if (k.can_verify) {
          statusBadge = '<span class="badge badge-pending">⏳ Pending</span>';
        } else if (k.status_verif === 'Ditolak') {
          statusBadge = '<span class="badge badge-rejected">❌ Ditolak</span>';
        } else {
          statusBadge = '<span class="badge badge-approved">✅ ' + (k.status_verif || 'Disetujui') + '</span>';
        }
        
        var actions = '';
        if (k.can_verify) {
          actions = '<button class="btn-action btn-approve" onclick="openModal(' + idx + ')">✅ Verifikasi</button>';
        } else if (k.status_verif === 'Ditolak' && k.catatan_verif) {
          actions = '<small style="color:var(--red);font-weight:600;word-break:break-word;">❌ ' + k.catatan_verif + '</small>';
        } else {
          actions = '<small style="color:var(--green);font-weight:600;">✅ Sudah diverifikasi</small>';
        }
        
        var isChecked = selectedItems.has(idx) ? 'checked' : '';
        
        html += '<tr>';
        html += '<td><input type="checkbox" ' + isChecked + ' onchange="toggleCheckbox(' + idx + ')" class="row-checkbox"></td>';
        html += '<td><strong>' + (k.nama || '-') + '</strong><br><small style="color:var(--text3)">' + (k.jabatan || '-') + '</small></td>';
        html += '<td>' + tglDisplay + '</td>';
        html += '<td>' + (k.nama_keg || '-') + '<br><small style="color:var(--text3)">' + (k.kode_keg || '-') + '</small></td>';
        html += '<td><strong style="color:var(--blue)">' + (k.total_poin || 0) + '</strong></td>';
        html += '<td>' + linkBukti + '</td>';
        html += '<td>' + statusBadge + '</td>';
        html += '<td>' + actions + '</td>';
        html += '</tr>';
        
        k._idx = idx;
      });
      
      tbody.innerHTML = html;
      window._filteredKegiatan = filteredKegiatan;
      updateSelectAllCheckbox();
    }

    // ============================================================
    // CHECKBOX FUNCTIONS
    // ============================================================
    function toggleCheckbox(idx) {
      if (selectedItems.has(idx)) {
        selectedItems.delete(idx);
      } else {
        selectedItems.add(idx);
      }
      updateBulkActionsBar();
      updateSelectAllCheckbox();
    }

    function toggleSelectAll() {
      var checkbox = document.getElementById('selectAllCheckbox');
      if (checkbox.checked) {
        filteredKegiatan.forEach((k, idx) => {
          if (k.can_verify) selectedItems.add(idx);
        });
      } else {
        selectedItems.clear();
      }
      renderTable();
      updateBulkActionsBar();
    }

    function updateSelectAllCheckbox() {
      var checkbox = document.getElementById('selectAllCheckbox');
      var selectableCount = filteredKegiatan.filter(k => k.can_verify).length;
      var selectedCount = Array.from(selectedItems).filter(idx => 
        filteredKegiatan[idx] && filteredKegiatan[idx].can_verify
      ).length;
      
      checkbox.indeterminate = selectedCount > 0 && selectedCount < selectableCount;
      checkbox.checked = selectableCount > 0 && selectedCount === selectableCount;
    }

    function updateBulkActionsBar() {
      var bar = document.getElementById('bulkActionsBar');
      if (selectedItems.size > 0) {
        bar.style.display = 'flex';
        document.getElementById('selectedCount').textContent = selectedItems.size;
      } else {
        bar.style.display = 'none';
      }
    }

    function clearAllCheckbox() {
      selectedItems.clear();
      document.getElementById('selectAllCheckbox').checked = false;
      renderTable();
      updateBulkActionsBar();
    }

    // ============================================================
    // SINGLE VERIFICATION
    // ============================================================
    function openModal(displayIdx) {
      currentItem = window._filteredKegiatan[displayIdx];
      document.getElementById('modalTitle').textContent = '✅ Verifikasi Kegiatan';
      document.getElementById('modalInfo').innerHTML = 
        '<strong>' + (currentItem.nama || '-') + '</strong> — ' + (currentItem.jabatan || '-') + '<br>' +
        '<span style="display:block;margin-top:6px;"><strong>Kegiatan:</strong> ' + (currentItem.nama_keg || '-') + '</span>' +
        '<span style="display:block;"><strong>Tanggal:</strong> ' + (currentItem.tanggal ? new Date(currentItem.tanggal).toLocaleDateString('id-ID') : '-') + '</span>' +
        '<span style="display:block;"><strong>Poin:</strong> ' + (currentItem.total_poin || 0) + '</span>' +
        (currentItem.catatan ? '<span style="display:block;"><strong>Catatan Staff:</strong> ' + currentItem.catatan + '</span>' : '');
      
      document.getElementById('catatanVerif').value = '';
      document.getElementById('modalVerif').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalVerif').classList.remove('active');
      currentItem = null;
    }

    function verifikasi(action) {
      if (!currentItem) return;
      var catatan = action === 'tolak' ? document.getElementById('catatanVerif').value.trim() : '';
      if (action === 'tolak' && !catatan) {
        alert('⚠️ Masukkan alasan penolakan!');
        return;
      }
      
      var btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'verifikasiKegiatan',
          nip_pegawai: currentItem.nip,
          row_index: currentItem.row_index,
          action_verif: action,
          eselon_atasan: session.eselon,
          catatan: catatan
        })
      })
      .then(r => r.json())
      .then(j => {
        if (j.ok) {
          showAlert('✅ Kegiatan berhasil ' + (action === 'tolak' ? 'ditolak' : 'disetujui'), 'success');
          closeModal();
          setTimeout(() => loadData(), 1000);
        } else {
          showAlert('❌ Error: ' + (j.message || 'Verifikasi gagal'), 'error');
        }
      })
      .catch(err => {
        console.error('❌ Error:', err);
        showAlert('❌ Error: ' + err.message, 'error');
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = action === 'tolak' ? '❌ Tolak' : '✅ Setuju';
      });
    }

    // ============================================================
    // BULK VERIFICATION
    // ============================================================
    function bulkApprove() {
      if (selectedItems.size === 0) {
        alert('⚠️ Pilih minimal 1 kegiatan!');
        return;
      }
      if (!confirm('⚠️ Validasi ' + selectedItems.size + ' kegiatan?')) return;
      processBulkVerification('setuju', '');
    }

    function openBulkRejectModal() {
      if (selectedItems.size === 0) {
        alert('⚠️ Pilih minimal 1 kegiatan!');
        return;
      }
      document.getElementById('bulkRejectCount').textContent = selectedItems.size;
      document.getElementById('modalBulkReject').classList.add('active');
    }

    function closeBulkRejectModal() {
      document.getElementById('modalBulkReject').classList.remove('active');
      document.getElementById('catatanBulkReject').value = '';
    }

    function bulkReject() {
      var catatan = document.getElementById('catatanBulkReject').value.trim();
      if (!catatan) {
        alert('⚠️ Masukkan alasan penolakan!');
        return;
      }
      if (!confirm('⚠️ Tolak ' + selectedItems.size + ' kegiatan?')) return;
      closeBulkRejectModal();
      processBulkVerification('tolak', catatan);
    }

    function processBulkVerification(action, catatan) {
      console.log('🔄 Processing bulk verification... Count:', selectedItems.size);
      
      var selectedArray = Array.from(selectedItems)
        .map(idx => window._filteredKegiatan[idx])
        .filter(k => k && k.can_verify);

      if (selectedArray.length === 0) {
        showAlert('⚠️ Tidak ada kegiatan yang bisa diverifikasi', 'error');
        return;
      }

      var promises = selectedArray.map(item => {
        return fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'verifikasiKegiatan',
            nip_pegawai: item.nip,
            row_index: item.row_index,
            action_verif: action,
            eselon_atasan: session.eselon,
            catatan: catatan
          })
        }).then(r => r.json());
      });

      Promise.all(promises)
        .then(results => {
          var success = results.filter(r => r.ok).length;
          var failed = results.length - success;

          if (success > 0) {
            showAlert(
              '✅ ' + success + ' kegiatan berhasil ' + (action === 'tolak' ? 'ditolak' : 'divalidasi') +
              (failed > 0 ? '\n⚠️ ' + failed + ' kegiatan gagal' : ''),
              'success'
            );
          }
          if (failed > 0) {
            showAlert('❌ ' + failed + ' kegiatan gagal diproses', 'error');
          }

          setTimeout(() => {
            selectedItems.clear();
            loadData();
          }, 1500);
        })
        .catch(err => {
          console.error('❌ Bulk error:', err);
          showAlert('❌ Error: ' + err.message, 'error');
        });
    }

    // ============================================================
    // LOGOUT
    // ============================================================
    function logout() {
      if (confirm('⚠️ Anda yakin ingin logout?')) {
        localStorage.removeItem(SESSION_KEY);
        location.href = 'index.html';
      }
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    document.getElementById('filterStatus').addEventListener('change', renderTable);
    document.getElementById('filterPegawai').addEventListener('change', renderTable);

    document.getElementById('modalVerif').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalVerif')) closeModal();
    });

    document.getElementById('modalBulkReject').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalBulkReject')) closeBulkRejectModal();
    });

    // ============================================================
    // INIT
    // ============================================================
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>
</html>
