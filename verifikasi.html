<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Kegiatan - BEKARYE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root{--bg:#f1f5f9;--bg2:#ffffff;--text:#0f172a;--text2:#334155;--text3:#64748b;--border:#e2e8f0;--blue:#2563eb;--green:#059669;--red:#dc2626;--yellow:#f59e0b}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
    
    /* NAVBAR */
    .navbar{background:var(--bg2);padding:16px 20px;border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .navbar-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:20px}
    .navbar-brand{font-size:18px;font-weight:800}
    .navbar-right{display:flex;gap:10px;align-items:center}
    .nav-info{font-size:13px;color:var(--text2);font-weight:600}
    .btn-logout{padding:8px 14px;background:var(--red);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;transition:all .2s}
    .btn-logout:hover{background:#b91c1c;transform:translateY(-1px)}
    
    /* MAIN */
    .main{max-width:1400px;margin:0 auto;padding:20px}
    
    /* HEADER */
    .header{background:var(--bg2);padding:24px;border-radius:12px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .header h1{font-size:24px;margin-bottom:4px}
    .header p{color:var(--text3);font-size:14px}
    
    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:var(--bg2);padding:20px;border-radius:12px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .stat-card.pending{border-left-color:var(--yellow)}
    .stat-card.approved{border-left-color:var(--green)}
    .stat-card.rejected{border-left-color:var(--red)}
    .stat-label{font-size:12px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px}
    .stat-value{font-size:28px;font-weight:800}
    
    /* FILTER */
    .filter-bar{background:var(--bg2);padding:16px;border-radius:12px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .filter-bar select{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg2);color:var(--text)}
    .filter-bar select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .btn-refresh{padding:10px 16px;background:var(--blue);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s}
    .btn-refresh:hover{background:#1d4ed8;transform:translateY(-1px)}
    
    /* TABLE */
    .table-wrap{background:var(--bg2);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    table{width:100%;border-collapse:collapse}
    th{padding:14px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text2);background:#f8fafc;border-bottom:2px solid var(--border)}
    td{padding:14px;border-bottom:1px solid var(--border);font-size:13px}
    tr:hover{background:#f8fafc}
    
    .badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
    .badge-pending{background:rgba(245,158,11,.15);color:var(--yellow)}
    .badge-approved{background:rgba(5,150,105,.15);color:var(--green)}
    .badge-rejected{background:rgba(220,38,38,.15);color:var(--red)}
    
    .btn-link{color:var(--blue);cursor:pointer;text-decoration:none;font-weight:600;font-size:12px}
    .btn-link:hover{text-decoration:underline}
    
    .actions{display:flex;gap:6px}
    .btn-action{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;transition:all .2s}
    .btn-approve{background:var(--green);color:white}
    .btn-approve:hover{background:#047857}
    .btn-reject{background:var(--red);color:white}
    .btn-reject:hover{background:#b91c1c}
    
    .empty{text-align:center;padding:40px 20px;color:var(--text3)}
    .loading{text-align:center;padding:40px 20px}
    .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
    .modal-overlay.active{display:flex}
    .modal{background:var(--bg2);padding:24px;border-radius:12px;max-width:500px;width:90%}
    .modal h3{margin-bottom:16px;font-size:16px}
    .modal-info{background:var(--bg);padding:14px;border-radius:8px;margin-bottom:16px;font-size:13px;line-height:1.6}
    .modal-info strong{display:block;margin-bottom:4px;color:var(--blue)}
    .modal textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;min-height:80px;resize:vertical}
    .modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
    .modal-actions .btn-action{flex:1}
    
    @media(max-width:768px){
      .navbar-inner{flex-direction:column;gap:10px}
      .filter-bar{flex-direction:column}
      .filter-bar select{width:100%}
      .actions{flex-wrap:wrap}
      th,td{padding:10px 6px;font-size:11px}
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">✅ Verifikasi Kegiatan</div>
      <div class="navbar-right">
        <div class="nav-info">
          <span id="infoAtasan">Loading...</span>
        </div>
        <a href="dashboard.html" style="padding:8px 14px;background:#e2e8f0;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;color:var(--text2)">📊 Dashboard</a>
        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <!-- HEADER -->
    <div class="header">
      <h1>✅ Panel Verifikasi Kegiatan</h1>
      <p id="headerSub">Verifikasi kegiatan bawahan Anda</p>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card pending">
        <div class="stat-label">⏳ Menunggu</div>
        <div class="stat-value" id="statPending">-</div>
      </div>
      <div class="stat-card approved">
        <div class="stat-label">✅ Disetujui</div>
        <div class="stat-value" id="statApproved">-</div>
      </div>
      <div class="stat-card rejected">
        <div class="stat-label">❌ Ditolak</div>
        <div class="stat-value" id="statRejected">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">👥 Total Bawahan</div>
        <div class="stat-value" id="statBawahan">-</div>
      </div>
    </div>

    <!-- FILTER -->
    <div class="filter-bar">
      <select id="filterStatus">
        <option value="">⏳ Semua Status</option>
        <option value="pending">Menunggu Verifikasi</option>
        <option value="approved">Disetujui</option>
        <option value="rejected">Ditolak</option>
      </select>
      <select id="filterPegawai">
        <option value="">Semua Pegawai</option>
      </select>
      <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Pegawai</th>
            <th>Tanggal</th>
            <th>Kegiatan</th>
            <th>Poin</th>
            <th>Bukti</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="7" class="loading">
              <div class="spinner"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- MODAL VERIFIKASI -->
  <div class="modal-overlay" id="modalVerif">
    <div class="modal">
      <h3 id="modalTitle">Verifikasi Kegiatan</h3>
      <div class="modal-info" id="modalInfo"></div>
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:8px;">Catatan (jika ditolak):</label>
      <textarea id="catatanVerif" placeholder="Tulis alasan penolakan..."></textarea>
      <div class="modal-actions">
        <button class="btn-action btn-reject" onclick="verifikasi('tolak')">❌ Tolak</button>
        <button class="btn-action btn-approve" onclick="verifikasi('setuju')">✅ Setuju</button>
      </div>
    </div>
  </div>

  <script>
    var API_URL = 'GANTI_DENGAN_URL_APPS_SCRIPT_ANDA';
    var SESSION_KEY = 'bekarye-session';
    var session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    
    var allKegiatan = [];
    var currentItem = null;
    var bawahan = [];

    // Check login
    if (!session || !session.token) {
      location.href = 'index.html';
    }

    // Check role
    if (!session.is_verifikator) {
      alert('❌ Akses ditolak. Halaman ini hanya untuk pejabat eselon.');
      location.href = 'dashboard.html';
    }

    // ============================================================
    // Init
    // ============================================================
    document.getElementById('infoAtasan').textContent = 
      session.nama + ' — ' + session.jabatan + ' — Eselon ' + session.eselon;
    
    document.getElementById('headerSub').textContent = 
      'Verifikasi kegiatan bawahan Eselon ' + session.eselon;

    // ============================================================
    // Functions
    // ============================================================
    function loadData() {
      document.getElementById('tableBody').innerHTML = 
        '<tr><td colspan="7" class="loading"><div class="spinner"></div></td></tr>';
      
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'getKegiatanVerifikasi', 
          nip: session.nip 
        })
      })
      .then(r => r.json())
      .then(j => {
        console.log('Response:', j);
        if (j.ok) {
          allKegiatan = j.data.kegiatan || [];
          bawahan = j.data.bawahan || [];
          
          // Populate filter pegawai
          var selectP = document.getElementById('filterPegawai');
          selectP.innerHTML = '<option value="">Semua Pegawai</option>';
          bawahan.forEach(b => {
            selectP.innerHTML += '<option value="' + b.nip + '">' + b.nama + '</option>';
          });
          
          document.getElementById('statBawahan').textContent = bawahan.length;
          updateStats();
          renderTable();
        } else {
          alert('Error: ' + j.message);
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('tableBody').innerHTML = 
          '<tr><td colspan="7" class="empty">Error load data</td></tr>';
      });
    }

    function updateStats() {
      var pending = allKegiatan.filter(k => k.can_verify).length;
      var approved = allKegiatan.filter(k => 
        k.status_verif && k.status_verif.startsWith('Pending')
      ).length - pending;
      var rejected = allKegiatan.filter(k => k.status_verif === 'Ditolak').length;
      
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statApproved').textContent = approved;
      document.getElementById('statRejected').textContent = rejected;
    }

    function renderTable() {
      var statusFilter = document.getElementById('filterStatus').value;
      var pegawaiFilter = document.getElementById('filterPegawai').value;
      
      var filtered = allKegiatan.filter(k => {
        if (pegawaiFilter && k.nip !== pegawaiFilter) return false;
        
        if (statusFilter === 'pending' && !k.can_verify) return false;
        if (statusFilter === 'approved' && k.status_verif === 'Ditolak') return false;
        if (statusFilter === 'approved' && !k.status_verif.startsWith('Pending')) return false;
        if (statusFilter === 'rejected' && k.status_verif !== 'Ditolak') return false;
        
        return true;
      });
      
      var tbody = document.getElementById('tableBody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">📭 Tidak ada data</td></tr>';
        return;
      }
      
      var html = '';
      filtered.forEach((k, idx) => {
        var tglDisplay = k.tanggal ? new Date(k.tanggal).toLocaleDateString('id-ID') : '-';
        var linkBukti = k.link_bukti ? 
          '<a href="' + k.link_bukti + '" target="_blank" class="btn-link">📎 Lihat</a>' : '-';
        
        var statusBadge = '';
        if (k.can_verify) {
          statusBadge = '<span class="badge badge-pending">⏳ Pending</span>';
        } else if (k.status_verif === 'Ditolak') {
          statusBadge = '<span class="badge badge-rejected">❌ Ditolak</span>';
        } else {
          statusBadge = '<span class="badge badge-approved">✅ ' + k.status_verif + '</span>';
        }
        
        var actions = '';
        if (k.can_verify) {
          actions = '<button class="btn-action btn-approve" onclick="openModal(' + idx + ')">✅ Verifikasi</button>';
        } else if (k.status_verif === 'Ditolak' && k.catatan_verif) {
          actions = '<small style="color:var(--red);font-weight:600;">❌ ' + k.catatan_verif + '</small>';
        }
        
        html += '<tr>';
        html += '<td><strong>' + k.nama + '</strong><br><small style="color:var(--text3)">' + k.jabatan + '</small></td>';
        html += '<td>' + tglDisplay + '</td>';
        html += '<td>' + k.nama_keg + '<br><small style="color:var(--text3)">' + k.kode_keg + '</small></td>';
        html += '<td><strong style="color:var(--blue)">' + k.total_poin + '</strong></td>';
        html += '<td>' + linkBukti + '</td>';
        html += '<td>' + statusBadge + '</td>';
        html += '<td>' + actions + '</td>';
        html += '</tr>';
        
        k._idx = idx;
      });
      
      tbody.innerHTML = html;
      window._filteredKegiatan = filtered;
    }

    function openModal(displayIdx) {
      currentItem = window._filteredKegiatan[displayIdx];
      
      document.getElementById('modalTitle').textContent = '✅ Verifikasi Kegiatan';
      document.getElementById('modalInfo').innerHTML = 
        '<strong>' + currentItem.nama + '</strong> — ' + currentItem.jabatan + '<br>' +
        '<span style="display:block;margin-top:6px;"><strong>Kegiatan:</strong> ' + currentItem.nama_keg + '</span>' +
        '<span style="display:block;"><strong>Tanggal:</strong> ' + new Date(currentItem.tanggal).toLocaleDateString('id-ID') + '</span>' +
        '<span style="display:block;"><strong>Poin:</strong> ' + currentItem.total_poin + '</span>' +
        (currentItem.catatan ? '<span style="display:block;"><strong>Catatan Staff:</strong> ' + currentItem.catatan + '</span>' : '');
      
      document.getElementById('catatanVerif').value = '';
      document.getElementById('modalVerif').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalVerif').classList.remove('active');
      currentItem = null;
    }

    function verifikasi(action) {
      if (!currentItem) return;
      
      var catatan = action === 'tolak' ? document.getElementById('catatanVerif').value.trim() : '';
      
      if (action === 'tolak' && !catatan) {
        alert('⚠️ Masukkan alasan penolakan!');
        return;
      }
      
      var btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'verifikasiKegiatan',
          nip_pegawai: currentItem.nip,
          row_index: currentItem.row_index,
          action_verif: action,
          eselon_atasan: session.eselon,
          catatan: catatan
        })
      })
      .then(r => r.json())
      .then(j => {
        if (j.ok) {
          closeModal();
          loadData();
        } else {
          alert('❌ Error: ' + j.message);
        }
      })
      .catch(err => {
        alert('❌ Error: ' + err.message);
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = action === 'tolak' ? '❌ Tolak' : '✅ Setuju';
      });
    }

    function logout() {
      localStorage.removeItem(SESSION_KEY);
      location.href = 'index.html';
    }

    // Event listeners
    document.getElementById('filterStatus').addEventListener('change', renderTable);
    document.getElementById('filterPegawai').addEventListener('change', renderTable);

    // Jalankan saat load
    loadData();
  </script>
</body>
</html>
